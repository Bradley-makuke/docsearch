services:
  api-dev:
    image: ghcr.io/Bradley-makuke/docsearch-api:dev
    container_name: api-dev
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__MySQL=Server=mysql-dev;Database=docsearch_dev;Uid=root;Pwd=${MYSQL_ROOT_PASSWORD_DEV};
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER_DEV}:${MONGO_PASSWORD_DEV}@mongodb-dev:27017
      - ConnectionStrings__Redis=redis-dev:6379
      - OpenSearch__Url=http://opensearch-dev:9200
    depends_on:
      - mysql-dev
      - mongodb-dev
      - redis-dev
      - opensearch-dev
    networks:
      - dev-net
    ports:
      - "8081:8081"

  frontend-dev:
    image: ghcr.io/Bradley-makuke/docsearch-frontend:dev
    container_name: frontend-dev
    restart: unless-stopped
    networks:
      - dev-net
    ports:
      - "3001:80"

  mysql-dev:
    image: mysql:8.0
    container_name: mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_DEV}
      MYSQL_DATABASE: docsearch_dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-net

  mongodb-dev:
    image: mongo:7
    container_name: mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER_DEV}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD_DEV}
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - dev-net

  redis-dev:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    networks:
      - dev-net

  opensearch-dev:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch-dev
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - opensearch_dev_data:/usr/share/opensearch/data
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge

volumes:
  mysql_dev_data:
  mongo_dev_data:
  opensearch_dev_data: