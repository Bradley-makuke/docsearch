name: Deploy — Dev

on:
  push:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"
      - run: dotnet restore backend/DocSearch.sln
      - run: dotnet build backend/DocSearch.sln --no-restore
      - run: |
          dotnet test backend/DocSearch.sln \
            --no-build \
            --filter "Category!=Integration"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export MYSQL_CONNECTION="${{ secrets.MYSQL_CONNECTION_DEV }}"
            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD_DEV }}"
            export MONGO_USER="${{ secrets.MONGO_USER_DEV }}"
            export MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD_DEV }}"
            export MONGO_CONNECTION="${{ secrets.MONGO_CONNECTION_DEV }}"
            bash /home/deploy/docsearch/infrastructure/scripts/deploy.sh dev